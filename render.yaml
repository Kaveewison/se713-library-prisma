services:
  # Web Service
  - type: web
    name: se713-library-prisma
    runtime: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: library-db
          property: connectionString

databases:
  # PostgreSQL Database
  - name: library-db
    databaseName: library
    user: admin
